name: CI (Optimized)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # Setup job - install dependencies once, cache for all jobs
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate cache key
        id: cache-key
        run: echo "key=workspace-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma Client
        run: pnpm db:generate
      
      # Cache the entire workspace for downstream jobs
      - name: Cache workspace
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            packages/database/node_modules/.prisma
            packages/database/dist
          key: ${{ steps.cache-key.outputs.key }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            packages/database/node_modules/.prisma
            packages/database/dist
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Lint
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            packages/database/node_modules/.prisma
            packages/database/dist
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Type check
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            packages/database/node_modules/.prisma
            packages/database/dist
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            packages/database/node_modules/.prisma
            packages/database/dist
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Build all packages
        run: pnpm build
      
      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: apps/api/dist
          retention-days: 7
      
      - name: Upload Web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 7
